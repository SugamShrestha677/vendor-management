version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: vendor_procurement_db
    environment:
      MONGO_INITDB_DATABASE: vendor-procurement
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: vendor_procurement_backend
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/vendor-procurement
      JWT_SECRET: xresth@sug@m123
      CORS_ORIGIN: https://vendor-management-v1.netlify.app/
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    volumes:
      - .:/app
      - /app/node_modules

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile.frontend
    container_name: vendor_procurement_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      VITE_API_URL: https://vendor-management-backend-yte6.onrender.com

volumes:
  mongodb_data:
